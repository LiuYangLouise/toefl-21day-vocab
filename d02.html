            { en: "withstand", ipa: "/wɪðˈstænd/", pos: "v.", ch: "抵挡；挡住", example: "The shelter is designed to withstand strong earthquakes.", mainCat: "21天核心词", subCat: "Day 2", type: "core" }
        ];

        // ============================================================
        //  应用逻辑
        // ============================================================
        let currentWords = allVocab;
        let currentIndex = 0;
        let difficultSet = new Set();

        const flipper = document.getElementById('flipper');
        const mainEn = document.getElementById('mainEn');
        const cardBack = document.getElementById('cardBack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const speakBtn = document.getElementById('speakBtn');
        const thumbGrid = document.getElementById('thumbGrid');
        const exportBtn = document.getElementById('exportBtn');
        const totalCount = document.getElementById('totalCount');
        const totalCount2 = document.getElementById('totalCount2');
        const currentPos = document.getElementById('currentPos');

        function refreshCard() {
            if (currentWords.length === 0 || currentIndex < 0) {
                mainEn.textContent = '无';
                cardBack.innerHTML = '';
                return;
            }
            const w = currentWords[currentIndex];
            mainEn.textContent = w.en;
            currentPos.textContent = currentIndex + 1;

            let html = `<div class="back-en">${w.en}</div>`;
            if (w.ipa) html += `<div class="back-ipa">${w.ipa}</div>`;
            if (w.pos) html += `<div class="back-pos">${w.pos}</div>`;
            if (w.ch) html += `<div class="back-ch">${w.ch}</div>`;
            if (w.example) html += `<div class="back-example">📖 ${w.example}</div>`;
            cardBack.innerHTML = html;
            flipper.classList.remove('flipped');
        }

        function renderThumbnails() {
            thumbGrid.innerHTML = '';
            if (currentWords.length === 0) return;
            currentWords.forEach((w, idx) => {
                const key = `${w.en}|${w.ch || ''}`;
                const div = document.createElement('div');
                div.className = 'thumb-item';
                const isChecked = difficultSet.has(key) ? 'checked' : '';
                div.innerHTML = `
                    <input type="checkbox" class="diff-check" data-key="${key}" ${isChecked}>
                    <label>${w.en}</label>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        currentIndex = idx;
                        refreshCard();
                        document.querySelectorAll('.thumb-item').forEach(el => el.style.background = '#f9fff3');
                        div.style.background = '#d4ebc5';
                    }
                });
                const chk = div.querySelector('.diff-check');
                chk.addEventListener('change', (e) => {
                    e.stopPropagation();
                    const k = e.target.dataset.key;
                    e.target.checked ? difficultSet.add(k) : difficultSet.delete(k);
                });
                thumbGrid.appendChild(div);
            });
            const items = thumbGrid.querySelectorAll('.thumb-item');
            if (items[currentIndex]) {
                items[currentIndex].style.background = '#d4ebc5';
            }
        }

        function speakCurrentWord() {
            if (currentWords.length === 0 || currentIndex < 0) return;
            const w = currentWords[currentIndex];
            const voiceRadio = document.querySelector('input[name="voice"]:checked');
            const lang = voiceRadio ? voiceRadio.value : 'en-US';
            if (!window.speechSynthesis) {
                alert('您的浏览器不支持语音合成功能，请使用最新版 Chrome 或 Edge。');
                return;
            }
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(w.en);
            utterance.lang = lang;
            utterance.rate = 0.9;
            utterance.pitch = 1;
            const voices = window.speechSynthesis.getVoices();
            const matched = voices.find(v => v.lang.startsWith(lang));
            if (matched) utterance.voice = matched;
            window.speechSynthesis.speak(utterance);
        }

        function exportDifficult() {
            const selected = allVocab.filter(v => {
                const key = `${v.en}|${v.ch || ''}`;
                return difficultSet.has(key);
            });
            if (selected.length === 0) {
                alert('您还没有勾选任何难词');
                return;
            }
            let csv = "英文,词性,中文,例句\n";
            selected.forEach(w => {
                csv += `"${w.en}","${w.pos || ''}","${w.ch || ''}","${w.example || ''}"\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "托福难词表_Day2.csv";
            link.click();
        }

        flipper.addEventListener('click', () => {
            flipper.classList.toggle('flipped');
        });

        prevBtn.addEventListener('click', () => {
            if (currentWords.length === 0 || currentIndex < 0) return;
            currentIndex = (currentIndex - 1 + currentWords.length) % currentWords.length;
            refreshCard();
            renderThumbnails();
        });
        nextBtn.addEventListener('click', () => {
            if (currentWords.length === 0 || currentIndex < 0) return;
            currentIndex = (currentIndex + 1) % currentWords.length;
            refreshCard();
            renderThumbnails();
        });

        speakBtn.addEventListener('click', speakCurrentWord);
        exportBtn.addEventListener('click', exportDifficult);

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowLeft') { prevBtn.click();
                e.preventDefault(); }
            if (e.key === 'ArrowRight') { nextBtn.click();
                e.preventDefault(); }
            if (e.key === ' ' || e.key === 'Space') { e.preventDefault();
                speakBtn.click(); }
        });

        // 初始化
        totalCount.textContent = allVocab.length;
        totalCount2.textContent = allVocab.length;
        refreshCard();
        renderThumbnails();

        console.log(`✅ Reborn新生留学 · 托福核心词汇 Day 2 已加载，共 ${allVocab.length} 个单词`);
        console.log('💡 键盘: ← → 翻词，空格键 发音');
    </script>
