<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 | Reborn新生留学托福词汇</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;font-family: "微软雅黑",sans-serif;}
        body {background: #ffffff;text-align: center;padding-top: 120px;}
        .box {width: 400px;margin: 0 auto;padding: 40px;border: 1px solid #eee;border-radius: 12px;}
        h1 {font-size: 28px;margin-bottom: 30px;color: #222;}
        #pwd {width: 100%;padding: 14px;font-size: 18px;border: 1px solid #ddd;border-radius: 6px;margin-bottom: 20px;}
        #loginBtn {width: 100%;padding: 14px;font-size: 18px;background: #3366cc;color: white;border: none;border-radius: 6px;cursor: pointer;}
        #loginBtn:hover {background: #2852a3;}
    </style>
</head>
<body>
    <div class="box">
        <h1>Reborn新生留学 登录入口</h1>
        <input type="password" id="pwd" placeholder="请输入访问密码">
        <button id="loginBtn" onclick="verify()">登录进入词汇系统</button>
    </div>

    <script>
        // 这里是密码，你可以自己改引号里的数字/文字，比如改成 reborn2026
        const correctPassword = "reborn2026";
        function verify() {
            let inputPwd = document.getElementById("pwd").value;
            if (inputPwd === correctPassword) {
                // 密码正确，跳转到你的主页面 index.html
                window.location.href = "index.html";
            } else {
                alert("密码错误，请重新输入！");
            }
        }
    </script>
</body>
</html>
