<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reborn新生留学 · 托福核心词汇21天</title>
    <!-- 其他 head 内容保持不变（style、link字体等） -->
    <!-- 注意：这里不再放任何立即执行的 JS -->
    <style>
        /* 你的所有样式保持不变 */
    </style>
</head>
<body>
    <!-- 所有 HTML 内容不变 -->
    <!-- ... -->

    <script>
        // ===== 登录校验（放在 body 末尾，所有元素渲染完成后再执行） =====
        (function checkLogin() {
            if (!sessionStorage.getItem("loginOk")) {
                window.location.replace("login.html");
                return;
            }
        })();

        // ===== 其余所有 JS 逻辑 =====
        function getCurrentDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            return { year, month, day, weekday };
        }

        function updateDateDisplay() {
            const date = getCurrentDate();
            document.getElementById('year').textContent = date.year;
            document.getElementById('month').textContent = date.month;
            document.getElementById('day').textContent = date.day;
            document.getElementById('weekday').textContent = date.weekday;
        }

        function setupThemeToggle() {
            const themeSlider = document.getElementById('themeSlider');
            const body = document.body;
            themeSlider.addEventListener('click', () => {
                body.classList.toggle('light-mode');
                localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
            });
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') body.classList.add('light-mode');
        }

        function setupDayButtons() {
            const section = document.getElementById('buttonSection');
            section.innerHTML = '';
            for (let i = 1; i <= 21; i++) {
                const btn = document.createElement('button');
                btn.className = 'button';
                btn.textContent = `Day ${i}`;
                const fileName = String(i).padStart(2, '0') + '.html';
                btn.dataset.url = fileName;

                btn.addEventListener('click', function(e) {
                    // 水波纹动画（精简版）
                    const rect = this.getBoundingClientRect();
                    const ripple = document.createElement('div');
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.cssText = `
                        position:absolute;
                        border-radius:50%;
                        transform:scale(0);
                        animation:ripple 0.6s linear;
                        pointer-events:none;
                        width:${size}px;
                        height:${size}px;
                        left:${e.clientX - rect.left - size/2}px;
                        top:${e.clientY - rect.top - size/2}px;
                        background:${document.body.classList.contains('light-mode') ? 'rgba(26,26,26,0.2)' : 'rgba(255,255,255,0.3)'};
                    `;
                    this.style.position = 'relative';
                    this.style.overflow = 'hidden';
                    this.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                    // 跳转
                    window.location.href = this.dataset.url;
                });
                section.appendChild(btn);
            }
        }

        // 页面加载完成后执行所有初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateDateDisplay();
            setupThemeToggle();
            setupDayButtons();
            setInterval(updateDateDisplay, 86400000); // 每天更新一次日期
        });
    </script>
</body>
</html>
